<!doctype html>
<html lang="en" style="background: #ffffff; color: #000000;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- QR-based Restaurant Branding -->
    <title>QR Restaurant Menu</title>
    <meta name="description" content="QR-based digital restaurant menu" />
    <meta name="author" content="QR Restaurant" />

    <meta property="og:title" content="QR Restaurant Menu" />
    <meta property="og:description" content="QR-based digital restaurant menu" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/public/qr-restaurant-og.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@QRRestaurant" />
    <meta name="twitter:image" content="/public/qr-restaurant-og.png" />
    
    <!-- QR favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000'/><rect width='10' height='10' fill='%23FFF' x='10' y='10'/><rect width='10' height='10' fill='%23FFF' x='30' y='10'/><rect width='10' height='10' fill='%23FFF' x='10' y='30'/><rect width='10' height='10' fill='%23FFF' x='60' y='10'/><rect width='10' height='10' fill='%23FFF' x='80' y='10'/><rect width='10' height='10' fill='%23FFF' x='60' y='30'/><rect width='10' height='10' fill='%23FFF' x='80' y='30'/></svg>" />
    
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        color: #000000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      }
    </style>
    
    <script type="text/javascript">
      // Handle redirects from 404.html for SPA routing
      (function() {
        var redirect = sessionStorage.redirect;
        if (redirect) {
          delete sessionStorage.redirect;
          // Use replaceState to update the URL without reloading
          if (redirect !== location.pathname + location.search + location.hash) {
            history.replaceState(null, null, redirect);
          }
        }
      })();
    </script>
  </head>

  <body style="margin: 0; padding: 0; background-color: #ffffff; color: #000000;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="text/javascript">
      // Register service worker only in production
      if ('serviceWorker' in navigator && window.location.hostname !== 'localhost') {
        navigator.serviceWorker.register('/sw.js').catch((err) => {
          console.log('Service Worker registration failed:', err);
        });
      }
    </script>
  </body>
</html>
