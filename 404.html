<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>QR Restaurant Menu</title>
    <script type="text/javascript">
      // Store the path that caused the 404 and redirect to index.html
      // This enables client-side routing for SPAs on Firebase Hosting
      var l = window.location;
      sessionStorage.redirect = l.pathname + l.search + l.hash;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
    </script>
  </head>
  <body>
  </body>
</html>
