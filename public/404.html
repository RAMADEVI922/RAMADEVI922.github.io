<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>QR Restaurant Menu</title>
  <script>
    var l = window.location;
    var q = l.search ? '&q=' + l.search.slice(1) : '';
    var hash = l.hash || '';
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?p=' + l.pathname + q + hash);
  </script>
</head>
<body></body>
</html>
