<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>QR Restaurant Menu</title>
  <script>
    // GitHub Pages SPA redirect — store the path and redirect to index
    var path = window.location.pathname.replace('/QRMENU', '') || '/';
    var search = window.location.search;
    var hash = window.location.hash;
    sessionStorage.setItem('redirect', path + search + hash);
    window.location.replace('/QRMENU/');
  </script>
</head>
<body></body>
</html>
